<style>
  :root{
    --paper:#FBF7EC; --line:#D6E2EF; --margin:#E8ABAB;
    --ink:#2C2A26; --muted:#A99E8A; --pencil:#3A352E;
    --red:#DD6A5C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Patrick Hand', ui-rounded, system-ui, sans-serif;
    color:var(--ink); background:var(--paper); overflow:hidden;
  }
  .app{
    height:100%; display:flex; flex-direction:column;
    max-width:540px; margin:0 auto;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }

  /* ---- header / date ---- */
  .head{ padding:16px 22px 6px; }
  .eyebrow{ font-family:ui-sans-serif,system-ui,sans-serif; font-size:11px;
    letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); }
  .dateRow{ display:flex; align-items:flex-end; gap:6px; margin-top:2px; }
  .nav{ background:none; border:none; color:var(--muted); font-size:30px;
    line-height:1; padding:0 8px 6px; cursor:pointer; font-family:'Caveat',cursive; }
  .nav:active{ color:var(--ink); }
  .dateBtn{ position:relative; background:none; border:none; padding:2px 4px;
    text-align:left; cursor:pointer; display:flex; flex-direction:column; }
  .weekday{ font-family:'Caveat',cursive; font-weight:700; font-size:46px;
    line-height:.92; color:var(--ink); }
  .daterest{ font-family:'Caveat',cursive; font-weight:600; font-size:25px;
    color:#8A8170; margin-top:-1px; }
  .dateBtn input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .meta{ display:flex; gap:14px; align-items:center; margin-top:8px;
    font-family:ui-sans-serif,system-ui,sans-serif; font-size:12px; }
  .count{ color:var(--muted); }
  .today{ color:#3C72A8; background:none; border:none; cursor:pointer;
    font-size:12px; font-family:inherit; }

  /* ---- ruled page ---- */
  .scroll{
    flex:1; overflow-y:auto; overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch;
    background:
      repeating-linear-gradient(to bottom, transparent 0 29px, var(--line) 29px 30px),
      linear-gradient(to right, transparent 51px, var(--margin) 51px 52.5px, transparent 52.5px);
    background-attachment:local;
    padding-bottom:18px;
  }
  .empty{ white-space:pre-wrap; text-align:center; color:var(--muted);
    font-size:20px; line-height:1.5; padding:60px 36px; }

  .row{ position:relative; }
  .reveal{ position:absolute; inset:0; display:flex; align-items:center;
    justify-content:flex-end; padding-right:26px; background:var(--red);
    color:#fff; font-size:19px; opacity:0; }
  .card{
    position:relative; display:flex; align-items:flex-start; gap:12px;
    padding:0 18px 0 60px; min-height:30px;
    background:var(--paper); touch-action:pan-y; cursor:grab;
    transition:transform .3s cubic-bezier(.2,.9,.3,1.25);
  }
  .box{ flex:0 0 auto; width:17px; height:17px; margin-top:6px;
    border:2px solid var(--muted); border-radius:3px; transform:rotate(-3deg);
    position:relative; }
  .box.done{ border-color:var(--pencil); }
  .box.done::after{ content:'✓'; position:absolute; left:0; top:-9px;
    font-family:'Patrick Hand',sans-serif; font-size:19px; color:var(--pencil); }
  .txt-wrap{ position:relative; flex:0 1 auto; min-width:0; }
  .txt{ display:block; font-size:21px; line-height:30px; color:var(--ink);
    word-break:break-word; }
  .row.done .txt{ color:var(--muted); }
  .strike{ position:absolute; left:0; top:0; pointer-events:none; overflow:visible; }
  .strike path{ fill:none; stroke:var(--pencil); stroke-width:2.4;
    stroke-linecap:round; stroke-linejoin:round; filter:url(#rough); }
  .strike path:last-child{ stroke-width:1.6; opacity:.45; transform:translateY(1.4px); }

  /* ---- add bar ---- */
  .addbar{ display:flex; gap:10px; padding:10px 16px;
    border-top:1px solid #ECE4D3; background:var(--paper); }
  .addbar input{ flex:1; border:1.5px solid #E6DCC6; outline:none; background:#fff;
    border-radius:12px; padding:11px 15px; font-family:'Patrick Hand',sans-serif;
    font-size:20px; color:var(--ink); }
  .addbar input::placeholder{ color:#C2B7A0; }
  .addbar button{ flex:0 0 auto; width:50px; border:none; border-radius:12px;
    background:var(--pencil); color:#fff; font-size:30px; line-height:1;
    font-family:'Caveat',cursive; font-weight:700; cursor:pointer; }
  .addbar button:active{ transform:scale(.95); }
</style>
</head>
<body>
  <!-- rough pencil filter -->
  <svg width="0" height="0" style="position:absolute"><defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.9"
      numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4"/></filter>
  </defs></svg>

  <div class="app">
    <div class="head">
      <div class="eyebrow">Notebook</div>
      <div class="dateRow">
        <button class="nav" id="prev" aria-label="Previous day">‹</button>
        <button class="dateBtn" id="dateBtn">
          <span class="weekday" id="weekday"></span>
          <span class="daterest" id="daterest"></span>
          <input type="date" id="picker" aria-label="Pick a date">
        </button>
        <button class="nav" id="next" aria-label="Next day">›</button>
      </div>
      <div class="meta">
        <span class="count" id="count"></span>
        <button class="today" id="today">go to today</button>
      </div>
    </div>

    <div class="scroll" id="scroll"></div>

    <div class="addbar">
      <input id="add" placeholder="Write something to do" enterkeyhint="done"
        autocomplete="off" autocapitalize="sentences">
      <button id="addBtn" aria-label="Add">+</button>
    </div>
  </div>

<script>
(function(){
  var KEY='notebook:v1';
  var scroll=document.getElementById('scroll');
  var input=document.getElementById('add');
  var weekdayEl=document.getElementById('weekday');
  var daterestEl=document.getElementById('daterest');
  var countEl=document.getElementById('count');
  var picker=document.getElementById('picker');
  var todayBtn=document.getElementById('today');
  var animateId=null;

  function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function todayStr(){return iso(new Date());}
  function parseISO(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
  function fmtWeekday(s){return parseISO(s).toLocaleDateString(undefined,{weekday:'long'});}
  function fmtDate(s){return parseISO(s).toLocaleDateString(undefined,{month:'long',day:'numeric',year:'numeric'});}

  var state=load();
  function load(){
    try{var raw=localStorage.getItem(KEY);if(raw){var s=JSON.parse(raw);
      if(!s.pages)s.pages={}; if(!s.current)s.current=todayStr(); return s;}}catch(e){}
    return {current:todayStr(),pages:{}};
  }
  function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
  function tasks(){return state.pages[state.current]||(state.pages[state.current]=[]);}

  function shift(n){var d=parseISO(state.current);d.setDate(d.getDate()+n);state.current=iso(d);save();render();}
  document.getElementById('prev').onclick=function(){shift(-1);};
  document.getElementById('next').onclick=function(){shift(1);};
  todayBtn.onclick=function(){state.current=todayStr();save();render();};
  picker.onchange=function(){if(picker.value){state.current=picker.value;save();render();}};

  function addTask(){
    var v=input.value.trim(); if(!v)return;
    tasks().push({id:String(Date.now())+Math.floor(Math.random()*1000),text:v,done:false});
    input.value=''; save(); render();
    requestAnimationFrame(function(){scroll.scrollTop=scroll.scrollHeight;});
    input.focus();
  }
  document.getElementById('addBtn').onclick=addTask;
  input.addEventListener('keydown',function(e){if(e.key==='Enter')addTask();});

  function toggle(id){var t=tasks().find(function(x){return x.id===id;});if(!t)return;
    t.done=!t.done; if(t.done)animateId=id; save(); render();}
  function removeTask(id){var l=tasks();var i=l.findIndex(function(x){return x.id===id;});
    if(i>-1)l.splice(i,1); save(); render();}

  function jit(a){return (Math.random()*2-1)*a;}
  function buildD(w,lineH,lines){
    var d='';
    for(var li=0;li<lines;li++){
      var y=li*lineH+lineH*0.62;
      var segs=Math.max(5,Math.round(w/26));
      d+='M 1 '+(y+jit(2)).toFixed(1);
      for(var i=1;i<=segs;i++){
        var x=1+(w-2)*(i/segs);
        d+=' L '+x.toFixed(1)+' '+(y+jit(2.6)).toFixed(1);
      }
    }
    return d;
  }
  function buildStrike(li,t){
    var txt=li.querySelector('.txt'), svg=li.querySelector('.strike');
    var paths=svg.querySelectorAll('path');
    var w=Math.max(10,txt.clientWidth), h=Math.max(30,txt.clientHeight), lineH=30;
    var lines=Math.max(1,Math.round(h/lineH));
    svg.setAttribute('width',w); svg.setAttribute('height',h);
    svg.setAttribute('viewBox','0 0 '+w+' '+h);
    var d=buildD(w,lineH,lines), len=0;
    paths.forEach(function(p){p.setAttribute('d',d);len=p.getTotalLength();
      p.style.strokeDasharray=len;});
    var ctl={
      prog:function(pp){var off=len*(1-Math.max(0,Math.min(1,pp)));
        paths.forEach(function(p){p.style.strokeDashoffset=off;});},
      trans:function(b){paths.forEach(function(p){
        p.style.transition=b?'stroke-dashoffset .3s ease':'none';});}
    };
    if(t.done){
      if(animateId===t.id){ ctl.trans(false); ctl.prog(0);
        requestAnimationFrame(function(){requestAnimationFrame(function(){
          ctl.trans(true); ctl.prog(1);});}); animateId=null;
      } else { ctl.trans(false); ctl.prog(1); }
    } else { ctl.trans(false); ctl.prog(0); }
    return ctl;
  }

  function attachDrag(li,t,getStrike){
    var card=li.querySelector('.card'), reveal=li.querySelector('.reveal');
    var sx=0,sy=0,axis=null,on=false,dx=0,TH=66;
    function tr(b){var s=getStrike();if(s)s.trans(b);}
    function begin(x,y){on=true;sx=x;sy=y;axis=null;dx=0;card.style.transition='none';tr(false);}
    function move(x,y,ev){
      if(!on)return;
      var ddx=x-sx,ddy=y-sy;
      if(axis===null){ if(Math.abs(ddx)>6||Math.abs(ddy)>6){axis=Math.abs(ddx)>Math.abs(ddy)?'h':'v';} else return; }
      if(axis==='v')return;
      if(ev&&ev.cancelable)ev.preventDefault();
      dx=ddx; card.style.transform='translateX('+dx+'px)';
      var s=getStrike();
      if(s){ if(!t.done&&dx>0)s.prog(Math.min(dx/TH,1));
        else if(t.done&&dx>0)s.prog(1-Math.min(dx/TH,1)); }
      reveal.style.opacity = dx<0 ? Math.min(-dx/TH,1) : 0;
    }
    function end(){
      if(!on)return; on=false; card.style.transition=''; tr(true);
      if(dx>TH){ card.style.transform='translateX(0)'; var id=t.id;
        setTimeout(function(){toggle(id);},160); }
      else if(dx<-TH){ card.style.transform='translateX(-120%)'; var id2=t.id;
        setTimeout(function(){removeTask(id2);},170); }
      else { card.style.transform='translateX(0)'; var s=getStrike();
        if(s)s.prog(t.done?1:0); }
      reveal.style.opacity=0;
    }
    card.addEventListener('touchstart',function(e){begin(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    card.addEventListener('touchmove',function(e){move(e.touches[0].clientX,e.touches[0].clientY,e);},{passive:false});
    card.addEventListener('touchend',end); card.addEventListener('touchcancel',end);
    card.addEventListener('mousedown',function(e){begin(e.clientX,e.clientY);
      var mm=function(ev){move(ev.clientX,ev.clientY,ev);};
      var mu=function(){end();window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);};
      window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);});
  }

  function render(){
    weekdayEl.textContent=fmtWeekday(state.current);
    daterestEl.textContent=fmtDate(state.current);
    picker.value=state.current;
    var list=tasks(), left=list.filter(function(t){return !t.done;}).length;
    countEl.textContent=list.length?(left+' left of '+list.length):'';
    todayBtn.style.display=state.current===todayStr()?'none':'inline';

    scroll.innerHTML='';
    if(list.length===0){
      var e=document.createElement('div'); e.className='empty';
      e.textContent='This page is blank.\nWrite the first thing you want to do.';
      scroll.appendChild(e); return;
    }
    list.forEach(function(t){
      var li=document.createElement('div'); li.className='row'+(t.done?' done':'');
      li.innerHTML='<div class="reveal">tear out ✕</div><div class="card">'+
        '<span class="box'+(t.done?' done':'')+'"></span>'+
        '<span class="txt-wrap"><span class="txt"></span>'+
        '<svg class="strike" xmlns="http://www.w3.org/2000/svg"><path></path><path></path></svg>'+
        '</span></div>';
      li.querySelector('.txt').textContent=t.text;
      var strikeCtl=null;
      attachDrag(li,t,function(){return strikeCtl;});
      li.querySelector('.box').addEventListener('click',function(ev){ev.stopPropagation();toggle(t.id);});
      scroll.appendChild(li);
      requestAnimationFrame(function(){strikeCtl=buildStrike(li,t);});
    });
  }

  render();
})();
</script>
</body>
</html>
