<style>
  :root{
    --paper:#FBF7EC; --line:#D6E2EF; --margin:#E8ABAB;
    --ink:#2C2A26; --muted:#A99E8A; --pencil:#3A352E;
    --red:#DD6A5C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Patrick Hand', ui-rounded, system-ui, sans-serif;
    color:var(--ink); background:var(--paper); overflow:hidden;
  }
  .app{
    height:100%; display:flex; flex-direction:column;
    max-width:810px; margin:0 auto;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }

  /* ---- header / date (sizes are 1.5x the original notebook) ---- */
  .head{ padding:24px 33px 9px; }
  .eyebrow{ font-family:ui-sans-serif,system-ui,sans-serif; font-size:16.5px;
    letter-spacing:3.75px; text-transform:uppercase; color:var(--muted); }
  .dateRow{ display:flex; align-items:flex-end; gap:4px; margin-top:3px; }
  .nav{ flex:0 0 auto; background:none; border:none; color:var(--muted); font-size:45px;
    line-height:1; padding:0 4px 9px; cursor:pointer; font-family:'Caveat',cursive; }
  .nav:active{ color:var(--ink); }
  .dateBtn{ position:relative; background:none; border:none; padding:3px 6px;
    min-width:0; text-align:left; cursor:pointer; display:flex; flex-direction:column; }
  .weekday{ font-family:'Caveat',cursive; font-weight:700; font-size:69px;
    line-height:.92; color:var(--ink); }
  .daterest{ font-family:'Caveat',cursive; font-weight:600; font-size:38px;
    color:#8A8170; margin-top:-1.5px; }
  .dateBtn input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .meta{ display:flex; gap:21px; align-items:center; margin-top:12px;
    font-family:ui-sans-serif,system-ui,sans-serif; font-size:18px; }
  .count{ color:var(--muted); }
  .today{ color:#3C72A8; background:none; border:none; cursor:pointer;
    font-size:18px; font-family:inherit; }

  /* ---- ruled page (line height shrinks/grows to fit all tasks) ---- */
  .scroll{
    --lineH:45px;
    flex:1; overflow-y:auto; overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch;
    background:
      repeating-linear-gradient(to bottom, transparent 0 calc(var(--lineH) - 1px), var(--line) calc(var(--lineH) - 1px) var(--lineH)),
      linear-gradient(to right, transparent 76.5px, var(--margin) 76.5px 78.75px, transparent 78.75px);
    background-attachment:local;
    padding-bottom:27px;
  }
  .empty{ white-space:pre-wrap; text-align:center; color:var(--muted);
    font-size:30px; line-height:1.5; padding:90px 54px; }

  .row{ position:relative; }
  .reveal{ position:absolute; inset:0; display:flex; align-items:center;
    justify-content:flex-end; padding-right:39px; background:var(--red);
    color:#fff; font-size:28.5px; opacity:0; }
  .card{
    position:relative; display:flex; align-items:flex-start;
    padding:0 27px 0 90px; min-height:var(--lineH);
    touch-action:pan-y; cursor:grab;
    transition:transform .3s cubic-bezier(.2,.9,.3,1.25);
  }
  .txt-wrap{ position:relative; flex:0 1 auto; min-width:0; touch-action:none; }
  .txt{ display:block; font-size:calc(var(--lineH) * 0.7); line-height:var(--lineH);
    color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    user-select:none; -webkit-user-select:none; }
  .row.carried .txt{ color:var(--red); }
  .row.done .txt{ color:var(--muted); }
  .strike{ position:absolute; left:0; top:0; pointer-events:none; overflow:visible; }
  .strike .bg{ fill:none; stroke:var(--pencil); stroke-width:2.4; opacity:.4;
    stroke-linecap:round; stroke-linejoin:round; filter:url(#rough); transform:translateY(2.1px); }
  .strike .fg{ fill:none; stroke:var(--pencil); stroke-width:3.9;
    stroke-linecap:round; stroke-linejoin:round; filter:url(#rough); }

  /* ---- add bar ---- */
  .addbar{ display:flex; gap:15px; padding:15px 24px;
    border-top:1px solid #ECE4D3; background:var(--paper); }
  .addbar input{ flex:1; min-width:0; border:2.25px solid #E6DCC6; outline:none; background:#fff;
    border-radius:18px; padding:16.5px 22.5px; font-family:'Patrick Hand',sans-serif;
    font-size:30px; color:var(--ink); }
  .addbar input::placeholder{ color:#C2B7A0; }
  .addbar button{ flex:0 0 auto; width:75px; border:none; border-radius:18px;
    background:var(--pencil); color:#fff; font-size:45px; line-height:1;
    font-family:'Caveat',cursive; font-weight:700; cursor:pointer; }
  .addbar button:active{ transform:scale(.95); }

  /* ---- opt-in time-on-task: long-press (touch) / click-and-hold (mouse) the row ---- */
  .timeLabel{ flex:0 0 auto; align-self:center; margin-left:6px; padding:2px 6px;
    font-family:ui-sans-serif,system-ui,sans-serif; font-size:calc(var(--lineH) * 0.32);
    color:var(--pencil); white-space:nowrap; }
  .row.pressing .card{ background:rgba(58,53,46,.07); }
  .timePop{ position:fixed; z-index:10; width:230px; background:#fff;
    border:1.5px solid #E6DCC6; border-radius:14px; padding:14px 16px;
    box-shadow:0 8px 24px rgba(0,0,0,.18); font-family:ui-sans-serif,system-ui,sans-serif; }
  .timePop.hidden{ display:none; }
  .timePop .row2{ display:flex; align-items:center; gap:8px; }
  .timePop input[type=time]{ flex:1; min-width:0; font-family:inherit; font-size:16px;
    border:1px solid #E6DCC6; border-radius:8px; padding:6px 8px;
    background:#FBF7EC; color:var(--ink); }
  .timePop .actions{ display:flex; justify-content:space-between; gap:8px; margin-top:10px; }
  .timePop .actions button{ border:none; border-radius:8px; padding:6px 12px;
    font-family:inherit; font-size:14px; cursor:pointer; }
  .timePop .clearBtn{ background:#F3ECDD; color:var(--ink); }
  .timePop .doneBtn{ background:var(--pencil); color:#fff; }
</style>
</head>
<body>
  <!-- rough pencil filter -->
  <svg width="0" height="0" style="position:absolute"><defs>
    <filter id="rough" filterUnits="userSpaceOnUse" x="-50" y="-100" width="2000" height="200">
      <feTurbulence type="fractalNoise" baseFrequency="0.9"
      numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4"/></filter>
  </defs></svg>

  <div class="app">
    <div class="head">
      <div class="eyebrow">To-Do List</div>
      <div class="dateRow">
        <button class="nav" id="prev" aria-label="Previous day">‹</button>
        <button class="dateBtn" id="dateBtn">
          <span class="weekday" id="weekday"></span>
          <span class="daterest" id="daterest"></span>
          <input type="date" id="picker" aria-label="Pick a date">
        </button>
        <button class="nav" id="next" aria-label="Next day">›</button>
      </div>
      <div class="meta">
        <span class="count" id="count"></span>
        <button class="today" id="today">go to today</button>
      </div>
    </div>

    <div class="scroll" id="scroll"></div>

    <div class="addbar">
      <input id="add" placeholder="Write something to do" enterkeyhint="done"
        autocomplete="off" autocapitalize="sentences">
      <button id="addBtn" aria-label="Add">+</button>
    </div>
  </div>

  <div class="timePop hidden" id="timePop">
    <div class="row2">
      <input type="time" id="timeStart" aria-label="Start time">
      <span>to</span>
      <input type="time" id="timeEnd" aria-label="End time">
    </div>
    <div class="actions">
      <button type="button" id="timeClear">Clear time</button>
      <button type="button" id="timeDone">Done</button>
    </div>
  </div>

<script>
(function(){
  var KEY='todo:v1';
  var MAX_LINE=45, MIN_LINE=26, TAP_PX=10, COMPLETE_AT=0.6, DELETE_TH=100, STRIKE_ANIM_MS=250;
  var LONGPRESS_MS=480, PRESS_FEEDBACK_MS=120, OUTSIDE_CLOSE_GUARD_MS=350;
  var API_BASE='https://notebook-api-ruddy.vercel.app';
  var API_KEY_STORAGE='todo:apikey';
  var PUSH_DEBOUNCE_MS=600;
  var timeZone=Intl.DateTimeFormat().resolvedOptions().timeZone;
  var scroll=document.getElementById('scroll');
  var input=document.getElementById('add');
  var weekdayEl=document.getElementById('weekday');
  var daterestEl=document.getElementById('daterest');
  var countEl=document.getElementById('count');
  var picker=document.getElementById('picker');
  var todayBtn=document.getElementById('today');
  var timePop=document.getElementById('timePop');
  var timeStart=document.getElementById('timeStart');
  var timeEnd=document.getElementById('timeEnd');
  var timeClear=document.getElementById('timeClear');
  var timeDone=document.getElementById('timeDone');

  function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function todayStr(){return iso(new Date());}
  function parseISO(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
  function fmtWeekday(s){return parseISO(s).toLocaleDateString(undefined,{weekday:'long'});}
  function fmtDate(s){return parseISO(s).toLocaleDateString(undefined,{month:'long',day:'numeric',year:'numeric'});}

  var state=load();
  function load(){
    try{var raw=localStorage.getItem(KEY);if(raw){var s=JSON.parse(raw);
      if(!s.pages)s.pages={}; if(!s.current)s.current=todayStr();
      if(!s.pendingDates)s.pendingDates={}; return s;}}catch(e){}
    return {current:todayStr(),pages:{},pendingDates:{}};
  }
  function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
  function tasks(){return state.pages[state.current]||(state.pages[state.current]=[]);}

  function getApiKey(){
    var k=localStorage.getItem(API_KEY_STORAGE);
    if(k===null){
      k=window.prompt('Enter sync key for this device (leave blank to skip syncing):')||'';
      try{localStorage.setItem(API_KEY_STORAGE,k);}catch(e){}
    }
    return k;
  }
  function apiUrl(date){return API_BASE+'/api/tasks?date='+date;}
  function apiHeaders(key){return {'Content-Type':'application/json','x-api-key':key};}

  var pushTimers={};
  function schedulePush(date){
    state.pendingDates[date]=true; save();
    clearTimeout(pushTimers[date]);
    pushTimers[date]=setTimeout(function(){flushPush(date);},PUSH_DEBOUNCE_MS);
  }
  function flushPush(date){
    var key=getApiKey(); if(!key)return;
    var body=JSON.stringify({timeZone:timeZone,tasks:state.pages[date]||[]});
    fetch(apiUrl(date),{method:'PUT',headers:apiHeaders(key),body:body})
      .then(function(r){if(!r.ok)throw new Error('bad status');return r.json();})
      .then(function(data){
        state.pages[date]=data.tasks; delete state.pendingDates[date]; save();
        if(date===state.current)render();
      })
      .catch(function(){});
  }
  function syncDateFromServer(date){
    var key=getApiKey(); if(!key)return;
    if(state.pendingDates[date]){flushPush(date);return;}
    fetch(apiUrl(date),{headers:apiHeaders(key)})
      .then(function(r){if(!r.ok)throw new Error('bad status');return r.json();})
      .then(function(data){
        state.pages[date]=data.tasks; save();
        if(date===state.current){render();if(date===todayStr())carryForward();}
      })
      .catch(function(){});
  }

  function carryForward(){
    var today=todayStr();
    if(state.current!==today)return;
    var toCarry=[], modifiedDates=[];
    Object.keys(state.pages).sort().forEach(function(d){
      if(d>=today)return;
      var remaining=[], moved=false;
      (state.pages[d]||[]).forEach(function(t){
        if(!t.done&&!t.start&&!t.end){
          toCarry.push(Object.assign({},t,{carriedOver:true}));
          moved=true;
        } else {
          remaining.push(t);
        }
      });
      if(moved){state.pages[d]=remaining;modifiedDates.push(d);}
    });
    if(toCarry.length===0)return;
    var todayIds=new Set((state.pages[today]||[]).map(function(t){return t.id;}));
    var fresh=toCarry.filter(function(t){return !todayIds.has(t.id);});
    if(fresh.length===0)return;
    state.pages[today]=fresh.concat(state.pages[today]||[]);
    save();render();
    modifiedDates.forEach(function(d){schedulePush(d);});
    schedulePush(today);
  }

  function shift(n){closeTimePop();var d=parseISO(state.current);d.setDate(d.getDate()+n);state.current=iso(d);
    save();render();syncDateFromServer(state.current);}
  document.getElementById('prev').onclick=function(){shift(-1);};
  document.getElementById('next').onclick=function(){shift(1);};
  todayBtn.onclick=function(){closeTimePop();state.current=todayStr();save();render();syncDateFromServer(state.current);carryForward();};
  picker.onchange=function(){if(picker.value){closeTimePop();state.current=picker.value;
    save();render();syncDateFromServer(state.current);}};

  function addTask(){
    var v=input.value.trim(); if(!v)return;
    tasks().push({id:String(Date.now())+Math.floor(Math.random()*1000),text:v,done:false,
      start:null,end:null,googleEventId:null});
    input.value=''; save(); render(); schedulePush(state.current);
    requestAnimationFrame(function(){
      if(scroll.style.overflowY==='auto')scroll.scrollTop=scroll.scrollHeight;
    });
    input.focus();
  }
  document.getElementById('addBtn').onclick=addTask;
  input.addEventListener('keydown',function(e){if(e.key==='Enter')addTask();});

  function removeTask(id){
    if(editingTask&&editingTask.id===id)closeTimePop();
    var l=tasks();var i=l.findIndex(function(x){return x.id===id;});
    if(i>-1)l.splice(i,1); save(); render(); schedulePush(state.current);}

  function fitLines(count){
    var available=scroll.clientHeight||400;
    var n=Math.max(count,1);
    var lineH=Math.min(MAX_LINE,Math.max(MIN_LINE,Math.floor(available/n)));
    scroll.style.setProperty('--lineH',lineH+'px');
    scroll.style.overflowY = (n*lineH>available) ? 'auto' : 'hidden';
  }

  function jit(a){return (Math.random()*2-1)*a;}
  function buildRoughPath(w,h){
    var y=h*0.6, segs=Math.max(5,Math.round(w/26));
    var d='M 1 '+(y+jit(2)).toFixed(1);
    for(var i=1;i<=segs;i++){
      var x=1+(w-2)*(i/segs);
      d+=' L '+x.toFixed(1)+' '+(y+jit(2.6)).toFixed(1);
    }
    return d;
  }
  function updateHeaderCounts(){
    var list=tasks(), left=list.filter(function(x){return !x.done;}).length;
    countEl.textContent=list.length?(left+' left of '+list.length):'';
  }

  function fmt12h(hhmm){
    var p=hhmm.split(':'), h=+p[0], m=p[1];
    var ap=h>=12?'p':'a', h12=h%12; if(h12===0)h12=12;
    return h12+(m==='00'?'':':'+m)+ap;
  }
  function timeRangeLabel(t){return fmt12h(t.start)+'–'+fmt12h(t.end);}

  var editingTask=null, timePopOpenedAt=0;
  function closeTimePop(){timePop.classList.add('hidden');editingTask=null;}
  function openTimePop(anchorEl,t){
    editingTask=t; timePopOpenedAt=Date.now();
    timeStart.value=t.start||''; timeEnd.value=t.end||'';
    timePop.classList.remove('hidden');
    var r=anchorEl.getBoundingClientRect();
    var left=Math.max(8,Math.min(r.left,window.innerWidth-238));
    timePop.style.top=(r.bottom+8)+'px'; timePop.style.left=left+'px';
  }
  function applyTimeChange(){
    if(!editingTask)return;
    editingTask.start=timeStart.value||null; editingTask.end=timeEnd.value||null;
    save(); schedulePush(state.current); render();
  }
  timeStart.addEventListener('change',applyTimeChange);
  timeEnd.addEventListener('change',applyTimeChange);
  timeClear.addEventListener('click',function(){
    timeStart.value=''; timeEnd.value=''; applyTimeChange(); closeTimePop();
  });
  timeDone.addEventListener('click',closeTimePop);
  document.addEventListener('mousedown',function(e){
    if(timePop.classList.contains('hidden'))return;
    if(timePop.contains(e.target))return;
    if(Date.now()-timePopOpenedAt<OUTSIDE_CLOSE_GUARD_MS)return;
    closeTimePop();
  });

  function makeLongPress(opts){
    var timer=null, feedbackTimer=null, sx=0, sy=0, fired=false, active=false;
    function clearTimers(){clearTimeout(timer);clearTimeout(feedbackTimer);}
    function start(x,y){
      active=true; fired=false; sx=x; sy=y; clearTimers();
      feedbackTimer=setTimeout(function(){if(active&&opts.onPressStart)opts.onPressStart();},PRESS_FEEDBACK_MS);
      timer=setTimeout(function(){
        if(!active)return; fired=true;
        if(opts.onPressEnd)opts.onPressEnd();
        opts.onFire();
      },LONGPRESS_MS);
    }
    function move(x,y){
      if(!active||fired)return;
      if(Math.abs(x-sx)>TAP_PX||Math.abs(y-sy)>TAP_PX){
        active=false; clearTimers(); if(opts.onPressEnd)opts.onPressEnd();
      }
    }
    function cancel(){
      if(active&&!fired&&opts.onPressEnd)opts.onPressEnd();
      active=false; clearTimers();
    }
    return {start:start, move:move, cancel:cancel, fired:function(){return fired;}};
  }
  function buildStrikeSvg(svg,txt){
    var w=Math.max(10,txt.clientWidth), h=Math.max(20,txt.clientHeight);
    svg.setAttribute('width',w); svg.setAttribute('height',h);
    svg.setAttribute('viewBox','0 0 '+w+' '+h);
    var d=buildRoughPath(w,h), bg=svg.querySelector('.bg'), fg=svg.querySelector('.fg');
    bg.setAttribute('d',d); fg.setAttribute('d',d);
    return fg.getTotalLength();
  }
  function setStrikeProgress(svg,len,p,animated){
    var bg=svg.querySelector('.bg'), fg=svg.querySelector('.fg');
    var pp=Math.max(0,Math.min(1,p)), on=pp*len, gap=len*2+20;
    var trans=animated?'stroke-dasharray '+STRIKE_ANIM_MS+'ms ease':'none';
    bg.style.transition=trans; fg.style.transition=trans;
    bg.style.strokeDasharray=on+' '+gap; fg.style.strokeDasharray=on+' '+gap;
    if(pp>0){
      bg.style.visibility='visible'; fg.style.visibility='visible';
    } else if(animated){
      setTimeout(function(){bg.style.visibility='hidden';fg.style.visibility='hidden';},STRIKE_ANIM_MS+10);
    } else {
      bg.style.visibility='hidden'; fg.style.visibility='hidden';
    }
  }
  function dragProgress(wrap,clientX){
    var r=wrap.getBoundingClientRect();
    return (clientX-r.left)/Math.max(1,r.width);
  }

  function attachStrike(li,t){
    var wrap=li.querySelector('.txt-wrap'), svg=li.querySelector('.strike'), txt=li.querySelector('.txt');
    var len=buildStrikeSvg(svg,txt), dragging=false, startX=0, moved=0;
    setStrikeProgress(svg,len,t.done?1:0,false);

    var lp=makeLongPress({
      onPressStart:function(){li.classList.add('pressing');},
      onPressEnd:function(){li.classList.remove('pressing');},
      onFire:function(){dragging=false; setStrikeProgress(svg,len,t.done?1:0,false); openTimePop(li,t);}
    });

    function start(x){dragging=true;moved=0;startX=x;
      len=buildStrikeSvg(svg,txt); setStrikeProgress(svg,len,t.done?1:0,false);}
    function move(x){if(!dragging)return;
      moved=Math.max(moved,Math.abs(x-startX)); setStrikeProgress(svg,len,dragProgress(wrap,x),false);}
    function finish(x){
      if(!dragging)return; dragging=false;
      if(moved<TAP_PX){ if(!t.done)return; t.done=false; }
      else t.done=dragProgress(wrap,x)>=COMPLETE_AT;
      setStrikeProgress(svg,len,t.done?1:0,true);
      li.classList.toggle('done',t.done); updateHeaderCounts(); save(); schedulePush(state.current);
    }

    wrap.addEventListener('touchstart',function(e){e.stopPropagation();
      start(e.touches[0].clientX); lp.start(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    wrap.addEventListener('touchmove',function(e){lp.move(e.touches[0].clientX,e.touches[0].clientY); if(lp.fired())return;
      if(dragging){if(e.cancelable)e.preventDefault(); move(e.touches[0].clientX);}},{passive:false});
    wrap.addEventListener('touchend',function(e){e.stopPropagation();
      if(lp.fired()){lp.cancel();return;} lp.cancel(); finish(e.changedTouches[0].clientX);});
    wrap.addEventListener('touchcancel',function(e){e.stopPropagation();dragging=false;lp.cancel();
      setStrikeProgress(svg,len,t.done?1:0,false);});
    wrap.addEventListener('mousedown',function(e){e.stopPropagation();
      start(e.clientX); lp.start(e.clientX,e.clientY);
      var mm=function(ev){lp.move(ev.clientX,ev.clientY); if(lp.fired())return; move(ev.clientX);};
      var mu=function(ev){window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);
        if(lp.fired()){lp.cancel();return;} lp.cancel(); finish(ev.clientX);};
      window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);});
  }

  function attachSwipeDelete(li,t){
    var card=li.querySelector('.card'), reveal=li.querySelector('.reveal');
    var sx=0,sy=0,axis=null,on=false,dx=0;
    var lp=makeLongPress({
      onPressStart:function(){li.classList.add('pressing');},
      onPressEnd:function(){li.classList.remove('pressing');},
      onFire:function(){on=false;axis=null;card.style.transition='';card.style.transform='translateX(0)';
        reveal.style.opacity=0; openTimePop(li,t);}
    });
    function begin(x,y){on=true;sx=x;sy=y;axis=null;dx=0;card.style.transition='none';lp.start(x,y);}
    function move(x,y,ev){
      if(!on)return;
      lp.move(x,y); if(lp.fired())return;
      var ddx=x-sx,ddy=y-sy;
      if(axis===null){if(Math.abs(ddx)>6||Math.abs(ddy)>6){axis=Math.abs(ddx)>Math.abs(ddy)?'h':'v';}else return;}
      if(axis==='v')return;
      if(ev&&ev.cancelable)ev.preventDefault();
      dx=Math.min(0,ddx); card.style.transform='translateX('+dx+'px)';
      reveal.style.opacity=Math.min(-dx/DELETE_TH,1);
    }
    function end(){
      if(lp.fired()){lp.cancel();on=false;return;}
      lp.cancel();
      if(!on)return; on=false; card.style.transition='';
      if(dx<-DELETE_TH){card.style.transform='translateX(-120%)'; var id=t.id;
        setTimeout(function(){removeTask(id);},170);}
      else card.style.transform='translateX(0)';
      reveal.style.opacity=0;
    }
    card.addEventListener('touchstart',function(e){begin(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    card.addEventListener('touchmove',function(e){move(e.touches[0].clientX,e.touches[0].clientY,e);},{passive:false});
    card.addEventListener('touchend',end); card.addEventListener('touchcancel',end);
    card.addEventListener('mousedown',function(e){begin(e.clientX,e.clientY);
      var mm=function(ev){move(ev.clientX,ev.clientY,ev);};
      var mu=function(){end();window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);};
      window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);});
  }

  function render(){
    weekdayEl.textContent=fmtWeekday(state.current);
    daterestEl.textContent=fmtDate(state.current);
    picker.value=state.current;
    var list=tasks(), left=list.filter(function(t){return !t.done;}).length;
    countEl.textContent=list.length?(left+' left of '+list.length):'';
    todayBtn.style.display=state.current===todayStr()?'none':'inline';

    fitLines(list.length);
    scroll.innerHTML='';
    if(list.length===0){
      var e=document.createElement('div'); e.className='empty';
      e.textContent='This page is blank.\nWrite the first thing you want to do.';
      scroll.appendChild(e); return;
    }
    list.forEach(function(t){
      var li=document.createElement('div'); li.className='row'+(t.done?' done':'')+(t.carriedOver?' carried':'');
      li.innerHTML='<div class="reveal">tear out ✕</div><div class="card">'+
        '<span class="txt-wrap"><span class="txt"></span>'+
        '<svg class="strike" xmlns="http://www.w3.org/2000/svg"><path class="bg"></path><path class="fg"></path></svg>'+
        '</span>'+
        (t.start&&t.end?'<span class="timeLabel"></span>':'')+
        '</div>';
      li.querySelector('.txt').textContent=t.text;
      if(t.start&&t.end)li.querySelector('.timeLabel').textContent=timeRangeLabel(t);
      attachSwipeDelete(li,t);
      scroll.appendChild(li);
      requestAnimationFrame(function(){attachStrike(li,t);});
    });
  }

  var resizeTimer=null;
  window.addEventListener('resize',function(){
    clearTimeout(resizeTimer); resizeTimer=setTimeout(render,150);
  });

  render();
  carryForward();
  Object.keys(state.pendingDates).forEach(function(d){if(d!==state.current)flushPush(d);});
  syncDateFromServer(state.current);
})();
</script>
</body>
</html>
